name: 誠毅傳承每日自動發文

on:
  schedule:
    # cron 用 UTC 時間。台灣 = UTC+8。
    # 想在台灣早上 08:00 發 → UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:        # 也可在 GitHub 網頁手動觸發測試
    inputs:
      override_date:
        description: "強制指定發文日期 (YYYY-MM-DD)，留空則用今天"
        required: false
        default: ""

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - name: 取出專案
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 執行發文
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_IMAGE_BASE_URL: ${{ secrets.IG_IMAGE_BASE_URL }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date }}
        run: python scripts/post.py
